<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: url('/images/9.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 5px #00c3ff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(45deg, #007bff, #00c3ff);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Add Product</h2>

    <form th:action="@{/products}" th:object="${product}" method="post">
        
        <label>Name</label>
        <input type="text" th:field="*{name}" />

        <label>Price</label>
        <input type="number" step="0.01" th:field="*{price}" />

        <label>Quantity</label>
        <input type="number" th:field="*{quantity}" />

        <button type="submit">Save Product</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders</title>
</head>
<body style="font-family: Arial; padding:40px;">

<h1 style="text-align:center; color:black">Order List</h1>

<div style="text-align:center; margin-bottom:20px;">
    <a href="/orders/new"
       style="padding:10px 20px; color:white; text-decoration:none;background:#667eea; border-radius:5px;">
        Create Order
    </a>
</div>

<table style="margin:auto; border-collapse:collapse; width:70%; background:white;">
    <tr style="background:#343a40; color:white;">
        <th style="padding:10px;">ID</th>
        <th>User ID</th>
        <th>Product ID</th>
        <th>Quantity</th>
    </tr>

    <tr th:each="order : ${orders}" style="text-align:center;">
        <td style="padding:8px;" th:text="${order.id}"></td>
        <td th:text="${order.userId}"></td>
        <td th:text="${order.productId}"></td>
        <td th:text="${order.quantity}"></td>
    </tr>
</table>

</body>
</html>
<style>
body {
    background: url('/images/7.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
}
</style>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
</head>

<body style="
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: url('/images/2.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
">

    <div style="
        background: rgba(0,0,0,0.7);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    ">

        <div style="
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        ">

            <h2 style="
                font-size: 32px;
                margin-bottom: 25px;
                letter-spacing: 2px;
            ">
                Add User
            </h2>

            <form th:action="@{/users/save}" th:object="${user}" method="post">

                <div style="margin-bottom: 20px; text-align: left;">
                    <label>Name</label><br>
                    <input type="text" th:field="*{name}" style="
                        width: 100%;
                        padding: 10px;
                        margin-top: 5px;
                        border-radius: 20px;
                        border: none;
                        outline: none;
                        background: rgba(255,255,255,0.2);
                        color: white;
                    " />
                </div>

                <div style="margin-bottom: 25px; text-align: left;">
                    <label>Email</label><br>
                    <input type="text" th:field="*{email}" style="
                        width: 100%;
                        padding: 10px;
                        margin-top: 5px;
                        border-radius: 20px;
                        border: none;
                        outline: none;
                        background: rgba(255,255,255,0.2);
                        color: white;
                    " />
                </div>

                <button type="submit" style="
                    width: 100%;
                    padding: 10px;
                    border-radius: 25px;
                    border: none;
                    background-color: #00c6ff;
                    color: white;
                    font-size: 16px;
                    font-weight: bold;
                    cursor: pointer;
                    transition: 0.3s;
                ">
                    Save
                </button>

            </form>

        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body style="
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: url('/images/2.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        ">
    <div style="
        background: rgba(0,0,0,0.7);
        min-height: 100vh;
        padding: 40px;
    ">
        <h2 style="
            text-align:center;
            font-size: 36px;
            margin-bottom: 30px;
            letter-spacing: 2px;
			color:white;
        ">
            User List
        </h2>
        <div style="text-align:center; margin-bottom: 25px;">
            <a href="/users/add" style="
                text-decoration: none;
                background-color: #00c6ff;
                padding: 10px 20px;
                border-radius: 25px;
                color: white;
                font-weight: bold;
                transition: 0.3s;
            ">
                + Add New User
            </a>
        </div>

        <table border="0" style="
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            overflow: hidden;
        ">
            <tr style="
                background: rgba(255,255,255,0.2);
                font-size: 18px;
				color:white;
            ">
                <th style="padding:15px;">ID</th>
                <th style="padding:15px;">Name</th>
                <th style="padding:15px;">Email</th>
                <th style="padding:15px;">Action</th>
            </tr>

            <tr th:each="user : ${users}" style="text-align:center; color:white;">
                <td style="padding:15px;" th:text="${user.id}"></td>
                <td style="padding:15px;" th:text="${user.name}"></td>
                <td style="padding:15px;" th:text="${user.email}"></td>
                <td style="padding:15px;">
                    <a th:href="@{'/users/delete/' + ${user.id}}" style="
                        text-decoration: none;
                        background-color: #ff4b5c;
                        padding: 6px 14px;
                        border-radius: 20px;
                        color: white;
                        font-weight: bold;
                        transition: 0.3s;">
                        Delete
                    </a>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
